<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Система закупок нефтепромыслового МТО</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      body { background-color: #f8f9fa; }
      .sidebar {
        min-height: 100vh;
        background: linear-gradient(180deg, #1a237e 0%, #283593 100%);
        width: 240px;
        flex-shrink: 0;
      }
      .sidebar .nav-link {
        color: rgba(255,255,255,0.75);
        padding: 0.6rem 1.25rem;
        border-radius: 6px;
        margin: 2px 8px;
        font-size: 0.88rem;
        transition: all 0.15s;
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #fff;
        background: rgba(255,255,255,0.15);
      }
      .sidebar .nav-link i { margin-right: 8px; font-size: 1rem; }
      .sidebar .nav-section {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255,255,255,0.4);
        padding: 0.8rem 1.25rem 0.25rem;
        margin-top: 0.5rem;
      }
      .main-content { flex: 1; overflow-x: hidden; }
      .topbar {
        background: #fff;
        border-bottom: 1px solid #dee2e6;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
      .stat-card { border-left: 4px solid; }
      .badge-criticality-critical { background-color: #dc3545; }
      .badge-criticality-high    { background-color: #fd7e14; }
      .badge-criticality-medium  { background-color: #0d6efd; }
      .badge-criticality-low     { background-color: #6c757d; }
      .table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: #6c757d; }
      .page-title { font-size: 1.35rem; font-weight: 600; color: #1a237e; }
      .spinner-center {
        display: flex; align-items: center; justify-content: center; min-height: 300px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
