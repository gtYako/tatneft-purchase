name: Deploy to Production

on:
  push:
    branches:
      - main  # только push в main запускает деплой

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # нужно для сравнения с предыдущим коммитом

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            REPO=/opt/oil_procurement
            OWNER=$(stat -c '%U' $REPO)
            echo "==> Repo owner: $OWNER"
            sudo -u $OWNER git -C $REPO config --global --add safe.directory $REPO
            echo "==> Pulling latest code..."
            sudo -u $OWNER git -C $REPO pull origin main
            echo "==> Checking if dependencies changed..."
            if sudo -u $OWNER git -C $REPO diff HEAD~1 HEAD --name-only | grep -qE 'requirements|Dockerfile|docker-compose'; then
              echo "==> Rebuilding containers..."
              docker compose -f $REPO/docker-compose.yml up -d --build
            else
              echo "==> Restarting containers..."
              docker compose -f $REPO/docker-compose.yml restart backend frontend nginx
            fi
            echo "==> Running migrations..."
            docker compose -f $REPO/docker-compose.yml exec -T backend python manage.py migrate --noinput
            echo "==> Collecting static files..."
            docker compose -f $REPO/docker-compose.yml exec -T backend python manage.py collectstatic --noinput
            echo "==> Deploy complete!"
