name: Deploy to Production

on:
  push:
    branches:
      - main  # только push в main запускает деплой

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # нужно для сравнения с предыдущим коммитом

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/oil_procurement
            echo "==> Pulling latest code..."
            git pull origin main
            echo "==> Checking if dependencies changed..."
            if git diff HEAD~1 HEAD --name-only | grep -qE 'requirements|Dockerfile|docker-compose'; then
              echo "==> Rebuilding containers..."
              docker compose up -d --build
            else
              echo "==> Restarting containers..."
              docker compose restart backend frontend nginx
            fi
            echo "==> Running migrations..."
            docker compose exec -T backend python manage.py migrate --noinput
            echo "==> Collecting static files..."
            docker compose exec -T backend python manage.py collectstatic --noinput
            echo "==> Deploy complete!"
